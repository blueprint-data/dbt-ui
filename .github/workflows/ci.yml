name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type check, lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Setup WASM
        run: pnpm run setup:wasm

      - name: Type check CLI
        run: pnpm --filter @blueprint-data/dbt-ui exec tsc --noEmit

      - name: Lint
        run: pnpm --filter dbt-docs-redesign lint

      - name: Build web app
        run: pnpm --filter dbt-docs-redesign build
