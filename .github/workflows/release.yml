name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install

      - name: Build NPM Package
        run: ./scripts/build-npm.sh

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Set up QEMU
        if: steps.changesets.outputs.published == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.changesets.outputs.published == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.changesets.outputs.published == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package version
        if: steps.changesets.outputs.published == 'true'
        id: package_version
        run: |
          version=$(node -p 'require("./packages/cli/package.json").version')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        if: steps.changesets.outputs.published == 'true'
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.package_version.outputs.version }}
            type=raw,value=v${{ steps.package_version.outputs.version }}

      - name: Build and push Docker image
        if: steps.changesets.outputs.published == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

      - name: Verify published image architectures
        if: steps.changesets.outputs.published == 'true'
        env:
          IMAGE_REF: ghcr.io/${{ github.repository }}:${{ steps.package_version.outputs.version }}
        run: |
          for attempt in {1..5}; do
            manifest="$(docker buildx imagetools inspect "$IMAGE_REF" 2>/dev/null)" && break
            if [[ "$attempt" -eq 5 ]]; then
              echo "Unable to inspect image manifest for $IMAGE_REF"
              exit 1
            fi
            sleep 5
          done

          echo "$manifest"

          if ! echo "$manifest" | grep -q 'Platform:.*linux/amd64'; then
            echo "Missing linux/amd64 in manifest for $IMAGE_REF"
            exit 1
          fi

          if ! echo "$manifest" | grep -q 'Platform:.*linux/arm64'; then
            echo "Missing linux/arm64 in manifest for $IMAGE_REF"
            exit 1
          fi
